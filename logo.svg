<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700');
    </style>
  </defs>
  <rect width="800" height="200" rx="8" fill="#0d1117"/>
  <!-- Scale/ruler marks evoking Planck length measurement -->
  <g stroke="#7d8590" stroke-width="1">
    <line x1="40" y1="170" x2="760" y2="170"/>
    <line x1="40" y1="165" x2="40" y2="175"/>
    <line x1="80" y1="168" x2="80" y2="172"/>
    <line x1="120" y1="168" x2="120" y2="172"/>
    <line x1="160" y1="165" x2="160" y2="175"/>
    <line x1="200" y1="168" x2="200" y2="172"/>
    <line x1="240" y1="168" x2="240" y2="172"/>
    <line x1="280" y1="165" x2="280" y2="175"/>
    <line x1="320" y1="168" x2="320" y2="172"/>
    <line x1="360" y1="168" x2="360" y2="172"/>
    <line x1="400" y1="165" x2="400" y2="175"/>
    <line x1="440" y1="168" x2="440" y2="172"/>
    <line x1="480" y1="168" x2="480" y2="172"/>
    <line x1="520" y1="165" x2="520" y2="175"/>
    <line x1="560" y1="168" x2="560" y2="172"/>
    <line x1="600" y1="168" x2="600" y2="172"/>
    <line x1="640" y1="165" x2="640" y2="175"/>
    <line x1="680" y1="168" x2="680" y2="172"/>
    <line x1="720" y1="168" x2="720" y2="172"/>
    <line x1="760" y1="165" x2="760" y2="175"/>
  </g>
  <!-- Planck length annotation -->
  <text x="760" y="188" fill="#8b949e" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" text-anchor="end">ℓₚ = 1.616 × 10⁻³⁵ m</text>
  <!-- Dimension segment (technical drawing style) -->
  <g stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <!-- Main segment line -->
    <line x1="52" y1="32" x2="52" y2="88"/>
    <!-- Top perpendicular bar -->
    <line x1="42" y1="32" x2="62" y2="32"/>
    <!-- Bottom perpendicular bar -->
    <line x1="42" y1="88" x2="62" y2="88"/>
  </g>
  <!-- Main title -->
  <text x="100" y="90" fill="#e6edf3" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="56" font-weight="700" letter-spacing="-1">
    <tspan fill="#58a6ff">Planck</tspan><tspan fill="#e6edf3">Claw</tspan>
  </text>
  <!-- Subtitle -->
  <text x="100" y="125" fill="#7d8590" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16">the smallest thing that can still think</text>
  <!-- Binary size callout -->
  <rect x="612" y="38" width="148" height="32" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="686" y="59" fill="#3fb950" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" text-anchor="middle">6,832 bytes</text>
</svg>
